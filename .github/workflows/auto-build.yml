name: 同步官方 Release 到服务器

on:
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: 获取官方最新 Release
        id: release
        uses: actions/github-script@v7
        with:
          script: |
            const { data } = await github.rest.repos.getLatestRelease({
              owner: 'wnzzer',
              repo: 'rank-analysis'
            });
            return data;

      - name: 下载并重命名安装包
        run: |
          URLS=$(echo '${{ steps.release.outputs.result }}' | jq -r '.assets[].browser_download_url')
          for url in $URLS; do
            curl -L -O "$url"
          done
          # 重命名为简单文件名，避免 tar 报错
          for f in *.exe; do
            [ -f "$f" ] && mv "$f" "lol-record-analysis-setup.exe" && break
          done
          for f in *.msi; do
            [ -f "$f" ] && mv "$f" "lol-record-analysis-installer.msi" && break
          done
          ls -la

      - name: 上传到服务器
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          source: "lol-record-analysis-setup.exe,lol-record-analysis-installer.msi"
          target: ${{ secrets.SERVER_PATH }}
          strip_components: 0