name: 自动构建并上传到服务器
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
on:
  workflow_dispatch:
  schedule:
    - cron: '0 2 * * *'
jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: 安装 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 安装 Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1

      - name: 安装 Tauri CLI
        run: npm install -g @tauri-apps/cli

      - name: 安装依赖
        run: npm install

      - name: 创建前端占位文件
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist
          Set-Content -Path dist/index.html -Value "<!DOCTYPE html><html><body><h1>Placeholder</h1></body></html>"

      - name: 修改 tauri 配置指向 dist
        shell: pwsh
        run: |
          $configPath = "src-tauri/tauri.conf.json"
          Copy-Item -Path $configPath -Destination "$configPath.bak" -Force
          $content = Get-Content $configPath -Raw
          $content = $content -replace '"distDir":\s*"[^"]*"', '"distDir": "../dist"'
          $content | Set-Content $configPath -NoNewline
          Write-Host "tauri.conf.json updated"

      - name: 编译项目
        run: tauri build

      - name: 上传到服务器
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          source: "src-tauri/target/release/bundle/msi/*.msi,src-tauri/target/release/bundle/nsis/*.exe"
          target: ${{ secrets.SERVER_PATH }}
          strip_components: 4