name: 自动构建并上传到服务器
on:
  workflow_dispatch:
  schedule:
    - cron: '0 2 * * *'
jobs:
  build:
    runs-on: windows-latest
    steps:
     - uses: actions/checkout@v4
     - name: 安装 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
     - name: 安装 Rust
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
     - name: 编译项目
        run: |
          npm install
          npm run tauri build
     - name: 上传到服务器
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          source: src-tauri/target/release/bundle/msi/*.msi,src-tauri/target/release/bundle/nsis/*.exe
          target: ${{ secrets.SERVER_PATH }}
          strip_components: 4