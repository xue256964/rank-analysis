name: 自动构建并上传到服务器
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
on:
  workflow_dispatch:
  schedule:
    - cron: '0 2 * * *'
jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: 安装 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 安装 Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1

      - name: 安装 Tauri CLI
        run: npm install -g @tauri-apps/cli

      - name: 安装依赖
        run: npm install

      - name: 创建前端占位文件（解决 “Unable to find your web assets”）
        run: |
          mkdir -p dist
          echo "<!DOCTYPE html><html><body><h1>Placeholder</h1></body></html>" > dist/index.html

      - name: 修改 tauri 配置指向 dist
        run: |
          # 备份原配置
          cp src-tauri/tauri.conf.json src-tauri/tauri.conf.json.bak
          # 修改 distDir 为相对路径 ../dist
          (Get-Content src-tauri/tauri.conf.json -Raw) -replace '"distDir":\s*"[^"]*"', '"distDir": "../dist"' | Set-Content src-tauri/tauri.conf.json

      - name: 编译项目
        run: tauri build

      - name: 上传到服务器
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          source: "src-tauri/target/release/bundle/msi/*.msi,src-tauri/target/release/bundle/nsis/*.exe"
          target: ${{ secrets.SERVER_PATH }}
          strip_components: 4