name: 自动构建并上传到服务器
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
on:
  workflow_dispatch:
  schedule:
    - cron: '0 2 * * *'
jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: 安装 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 安装 Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1

      - name: 安装 Tauri CLI
        run: npm install -g @tauri-apps/cli

      - name: 安装依赖
        run: npm install

      - name: 准备前端与修复配置 (绝对路径)
        shell: bash
        run: |
          node -e '
            const fs = require("fs");
            const path = require("path");
            const base = process.env.GITHUB_WORKSPACE;
            // 1. 创建 dist 占位文件
            const distDir = path.join(base, "dist");
            if (!fs.existsSync(distDir)) fs.mkdirSync(distDir);
            fs.writeFileSync(path.join(distDir, "index.html"), "<!DOCTYPE html><html><body><h1>Placeholder</h1></body></html>");
            // 2. 修改 tauri.conf.json
            const configPath = path.join(base, "src-tauri", "tauri.conf.json");
            let config = JSON.parse(fs.readFileSync(configPath, "utf8"));
            function replaceDistDir(obj) {
              for (let key in obj) {
                if (key === "distDir" && typeof obj[key] === "string") {
                  obj[key] = "../dist";
                } else if (typeof obj[key] === "object" && obj[key] !== null) {
                  replaceDistDir(obj[key]);
                }
              }
            }
            replaceDistDir(config);
            fs.writeFileSync(configPath, JSON.stringify(config, null, 2));
            console.log("Config updated, distDir set to ../dist");
          '

      - name: 编译项目
        run: tauri build

      - name: 上传到服务器
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          source: "src-tauri/target/release/bundle/msi/*.msi,src-tauri/target/release/bundle/nsis/*.exe"
          target: ${{ secrets.SERVER_PATH }}
          strip_components: 4