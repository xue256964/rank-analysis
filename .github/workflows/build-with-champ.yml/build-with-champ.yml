name: ChampR集成构建（仅编译）

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    defaults:
      run:
        working-directory: lol-record-analysis-tauri
    steps:
      - uses: actions/checkout@v4

      - name: 安装 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 安装 Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1

      - name: 安装前端依赖
        run: npm install

      - name: 构建 Tauri 应用
        run: |
          npm install -g @tauri-apps/cli
          npx tauri build

      - name: 保存构建产物（可在 Actions 页面下载）
        uses: actions/upload-artifact@v4
        with:
          name: 安装包
          path: |
            lol-record-analysis-tauri/src-tauri/target/release/bundle/msi/*.msi
            lol-record-analysis-tauri/src-tauri/target/release/bundle/nsis/*.exe
